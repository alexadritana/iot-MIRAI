version: '3.9'
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb
    environment:
      POSTGRES_DB: iotdb
      POSTGRES_USER: iot
      POSTGRES_PASSWORD: iotpass
    ports:
      - '5432:5432'
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U iot -d iotdb']
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - '1883:1883'
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  backend:
    build:
      context: ./backend
    container_name: backend
    ports:
      - '8000:8000'
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: '1883'
      DATABASE_URL: postgresql+asyncpg://iot:iotpass@timescaledb:5432/iotdb
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: 'http://backend:8000'
      VITE_WS_URL: 'ws://backend:8000/ws'
    depends_on:
      - backend

volumes:
  timescale-data:
